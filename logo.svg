  <!-- Geometric Fox / Low-poly animal (facing right, dynamic) -->
  <!-- Body -->
  <polygon points="130,280 200,220 270,280 250,340 150,340" fill="none" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linejoin="round" style="fill:none;color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
