  <line x1="130" y1="280" x2="200" y2="260" stroke="url(#logoGrad)" stroke-width="0.8" opacity="0.4" style="fill:rgb(0, 0, 0);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="270" y1="280" x2="200" y2="260" stroke="url(#logoGrad)" stroke-width="0.8" opacity="0.4" style="fill:rgb(0, 0, 0);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- REACT NATIVE label -->
  <text x="200" y="395" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="400" letter-spacing="6" fill="url(#textGrad1)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Courier New&quot;, monospace;font-size:13px;font-weight:400;text-anchor:middle;dominant-baseline:auto">REACT NATIVE</text>

  <!-- ENGINE NEXT label -->
  <text x="200" y="425" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" font-weight="700" letter-spacing="4" fill="url(#textGrad2)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Courier New&quot;, monospace;font-size:18px;font-weight:700;text-anchor:middle;dominant-baseline:auto">ENGINE NEXT</text>
