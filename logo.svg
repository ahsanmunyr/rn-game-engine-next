  <polygon points="200,220 230,220 200,260" fill="none" stroke="url(#logoGrad)" stroke-width="0.8" stroke-linejoin="round" opacity="0.5" style="fill:none;color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:round;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
